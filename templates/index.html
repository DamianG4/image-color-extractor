<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Palette Extractor</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f6fa;
            color: #2f3640;
            text-align: center;
            padding: 50px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .upload-section {
            margin: 30px 0;
            padding: 20px;
            border: 2px dashed #dcdde1;
            border-radius: 8px;
        }
        button {
            background-color: #0097e6;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #00a8ff;
        }
        .palette {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }
        .color-box {
            width: 120px;
            height: 120px;
            border-radius: 8px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 10px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: transform 0.2s;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
        .color-box:hover {
            transform: scale(1.05);
        }
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 5px;
            padding: 16px;
            position: fixed;
            z-index: 1;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
        }
        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎨 Color Palette Extractor</h1>
        <p>Wgraj zdjęcie, aby poznać jego 10 dominujących kolorów.</p>

        <div class="upload-section">
            <form method="POST" enctype="multipart/form-data">
                <input type="file" name="file" accept="image/*" required>
                <br>
                <button type="submit">Generuj paletę</button>
            </form>
        </div>

        {% if colors %}
        <h2>Twoja paleta kolorów:</h2>
        <p>Kliknij na kolor, aby skopiować jego kod HEX</p>
        <div class="palette">
            {% for color in colors %}
            <div class="color-box" style="background-color: {{ color }};" onclick="copyToClipboard('{{ color }}')">
                {{ color }}
            </div>
            {% endfor %}
        </div>
        {% endif %}
    </div>

    <div id="toast">Skopiowano!</div>

    <script>
        function copyToClipboard(hexText) {
            navigator.clipboard.writeText(hexText).then(function() {
                var toast = document.getElementById("toast");
                toast.innerHTML = "Skopiowano " + hexText;
                toast.className = "show";
                setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
            });
        }
    </script>
</body>
</html>
